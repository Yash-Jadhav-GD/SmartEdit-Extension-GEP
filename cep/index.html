<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SmartEdit</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // Global Error Handler
        window.onerror = function (message, source, lineno, colno, error) {
            var errorDiv = document.getElementById('global-error');
            if (!errorDiv) {
                errorDiv = document.createElement('div');
                errorDiv.id = 'global-error';
                errorDiv.style.background = '#a00';
                errorDiv.style.color = '#fff';
                errorDiv.style.padding = '10px';
                errorDiv.style.margin = '10px';
                errorDiv.style.whiteSpace = 'pre-wrap';
                errorDiv.style.fontFamily = 'monospace';
                document.body.prepend(errorDiv);
            }
            errorDiv.textContent += "Error: " + message + "\nLine: " + lineno + "\nSource: " + source + "\n\n";
        };
    </script>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>SmartEdit AI</h1>
            <button id="btnSettings" class="icon-btn">⚙️</button>
        </div>

        <!-- Settings Panel (Hidden by default) -->
        <div id="settingsPanel" class="panel hidden">
            <h3>AI Settings</h3>

            <div class="form-group">
                <label>Provider</label>
                <select id="providerSelect">
                    <option value="Ollama">Ollama (Local)</option>
                    <option value="OpenAI">OpenAI (Cloud)</option>
                </select>
            </div>

            <div class="form-group" id="modelGroup">
                <label>Model Name</label>
                <input type="text" id="modelInput" value="llama3" placeholder="e.g. qwen:14b">
            </div>

            <div class="form-group hidden" id="apiKeyGroup">
                <label>API Key</label>
                <input type="password" id="apiKeyInput" placeholder="sk-...">
            </div>

            <button id="saveSettings" class="secondary">Close</button>
        </div>

        <!-- Main Input -->
        <div class="section">
            <label>Video Script</label>
            <textarea id="scriptInput" placeholder="Paste your video script here..."></textarea>
        </div>

        <div class="row">
            <div class="col">
                <label>Style</label>
                <select id="styleSelect">
                    <option value="Corporate">Corporate</option>
                    <option value="Tech">Tech / Fast</option>
                    <option value="Dramatic">Dramatic</option>
                    <option value="Vlog">Vlog</option>
                </select>
            </div>
            <div class="col">
                <label>Target Duration (Sec)</label>
                <input type="number" id="durationInput" placeholder="e.g. 60" min="10" value="60">
            </div>
        </div>

        <div class="form-group">
            <label>Music Mode</label>
            <select id="musicMode">
                <option value="Auto">Auto (AI)</option>
                <option value="None">None</option>
            </select>
        </div>

        <div class="btn-group">
            <button id="btnGenerate" class="primary">Generate Edit Plan ✨</button>
        </div>

        <hr>

        <!-- Results Accordion Area -->
        <div id="resultsArea">
            <div id="status">Ready (Server: Checking...)</div>
        </div>

        <!-- Manual Controls -->
        <div class="manual-controls">
            <button id="btnBuild">Build Sequence</button>
            <button id="btnImport">Import Footage</button>
        </div>
    </div>

    <!-- CSInterface interaction (Local) -->
    <script src="CSInterface.js"></script>
    <script src="main.js"></script>
</body>

</html>
